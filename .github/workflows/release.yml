name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compare tag against workspace.package.version
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          cargo_version="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "helix-node") | .version')"
          if [ "$tag" != "v$cargo_version" ]; then
            echo "::error::Tag $tag does not match workspace version $cargo_version."
            echo "Bump [workspace.package] version in Cargo.toml to ${tag#v} and re-tag."
            exit 1
          fi
          echo "Tag $tag matches workspace version $cargo_version."

  build:
    name: Build (${{ matrix.label }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            archive_ext: zip
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin helix

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          staging="helix-${{ github.ref_name }}-${{ matrix.label }}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/helix "$staging/"
          cp README.md "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "helix-${{ github.ref_name }}-${{ matrix.label }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/helix.exe" "$staging/"
          Copy-Item "README.md" "$staging/"
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          echo "ASSET=$staging.zip" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ASSET }}

  build-gui:
    name: Build wallet (${{ matrix.name }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            rpm libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'gui/src-tauri -> target'
          key: gui-${{ matrix.name }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: gui
        run: npm install

      - name: Build the wallet
        working-directory: gui
        run: npm run tauri build

      - name: Collect installers (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p gui-dist
          find gui/src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' \) \
            -exec cp {} gui-dist/ \;
          ls -la gui-dist

      - name: Collect installers (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path gui-dist | Out-Null
          Get-ChildItem -Recurse gui/src-tauri/target/release/bundle -Include *.msi,*.exe |
            Copy-Item -Destination gui-dist
          Get-ChildItem gui-dist

      - name: Upload wallet installers
        uses: actions/upload-artifact@v7
        with:
          name: wallet-${{ matrix.name }}
          path: gui-dist/*
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [build, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
