name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compare tag against workspace.package.version
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          cargo_version="$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "helix-node") | .version')"
          if [ "$tag" != "v$cargo_version" ]; then
            echo "::error::Tag $tag does not match workspace version $cargo_version."
            echo "Bump [workspace.package] version in Cargo.toml to ${tag#v} and re-tag."
            exit 1
          fi
          echo "Tag $tag matches workspace version $cargo_version."

  build:
    name: Build (${{ matrix.label }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            archive_ext: zip
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin helix

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          staging="helix-cli-${{ github.ref_name }}-${{ matrix.label }}"
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/helix "$staging/"
          cp README.md "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "helix-cli-${{ github.ref_name }}-${{ matrix.label }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/helix.exe" "$staging/"
          Copy-Item "README.md" "$staging/"
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          echo "ASSET=$staging.zip" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ASSET }}

  build-gui:
    name: Build wallet (${{ matrix.name }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            name: macos-arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            name: windows
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            rpm libfuse2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'gui/src-tauri -> target'
          key: gui-${{ matrix.name }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: gui
        run: npm install

      # The GUI bundles a real `helix` node as a Tauri "sidecar" (see node_process.rs) so a
      # Helix Wallet install alone is a working validator setup — no separate CLI download.
      # Tauri's sidecar convention: the binary must sit at `src-tauri/binaries/<name>-<target-
      # triple>[.exe]`; it then copies/renames it into the bundle automatically at build time.
      - name: Build the bundled node/CLI sidecar
        run: cargo build --release --target ${{ matrix.target }} --bin helix

      - name: Place the sidecar binary (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p gui/src-tauri/binaries
          cp target/${{ matrix.target }}/release/helix "gui/src-tauri/binaries/helix-${{ matrix.target }}"

      - name: Place the sidecar binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/helix.exe" "gui/src-tauri/binaries/helix-${{ matrix.target }}.exe"

      - name: Build the wallet
        working-directory: gui
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Collect installers (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p gui-dist
          # An explicit `--target` above (needed so the sidecar's target-triple filename
          # matches) makes cargo/tauri nest output under target/<triple>/, even for the
          # host's own triple — target/release/bundle/ alone is empty.
          find gui/src-tauri/target/${{ matrix.target }}/release/bundle -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' \) \
            -exec cp {} gui-dist/ \;
          # Tauri names bundles after `productName` ("Helix Wallet") — rename to the same
          # `helix-gui-<tag>-<platform>` scheme the CLI archive uses, so the two release
          # assets read as a consistent pair instead of two differently-branded downloads.
          # The app's own display name (title bar, Start Menu/Applications entry) is
          # untouched — this only renames the downloadable file.
          for f in gui-dist/*; do
            ext="${f##*.}"
            mv "$f" "gui-dist/helix-gui-${{ github.ref_name }}-${{ matrix.name }}.$ext"
          done
          ls -la gui-dist

      - name: Collect installers (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path gui-dist | Out-Null
          # Same target/<triple>/ nesting note as the unix step above.
          Get-ChildItem -Recurse gui/src-tauri/target/${{ matrix.target }}/release/bundle -Include *.msi,*.exe |
            Copy-Item -Destination gui-dist
          # Same rename as the unix step — see its comment.
          Get-ChildItem gui-dist | ForEach-Object {
            $newName = "helix-gui-${{ github.ref_name }}-${{ matrix.name }}$($_.Extension)"
            Rename-Item -Path $_.FullName -NewName $newName
          }
          Get-ChildItem gui-dist

      - name: Upload wallet installers
        uses: actions/upload-artifact@v7
        with:
          name: wallet-${{ matrix.name }}
          path: gui-dist/*
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [build, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Needed for the release body: the static "which download do I need" section lives in
      # the repo, and the per-version part is the annotated tag's own message.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # A release page that lists nine assets and explains none of them makes people pick the
      # wrong one — or ask. (It did.) The body is assembled from three parts: a fixed section
      # telling each kind of user which single file they want, the annotated tag's message for
      # what changed in this specific version (git's own release notes, otherwise never shown
      # anywhere), and GitHub's generated commit list appended below by the action.
      - name: Assemble release body
        run: |
          set -euo pipefail
          cat .github/release-body.md > body.md
          printf '## What'"'"'s in %s\n\n' "${GITHUB_REF_NAME}" >> body.md
          # Strip the tag's own summary line ("v1.2.3 — headline"), since the heading above
          # already says which version this is.
          git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" \
            | sed "1s/^${GITHUB_REF_NAME} — //" >> body.md

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: body.md
          generate_release_notes: true
