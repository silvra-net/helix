name: Build Helix Wallet

# Builds the desktop wallet (helix-gui) for Linux, macOS, and Windows and uploads the installers
# as downloadable artifacts. Runs on any push that touches helix-gui, and on demand.
# Separate from ci.yml / release.yml (which build the node) — the GUI is excluded from the
# Cargo workspace, so those pipelines never see it and this one never touches the node.
on:
  push:
    branches: [master]
    paths:
      - 'helix-gui/**'
      - '.github/workflows/gui.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            rpm libfuse2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'helix-gui/src-tauri -> target'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: helix-gui
        run: npm install

      - name: Build the app
        working-directory: helix-gui
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: helix-wallet-${{ matrix.name }}
          path: |
            helix-gui/src-tauri/target/release/bundle/**
          if-no-files-found: warn
